<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Applicant Portal</title>

<style>
body {
    font-family: Arial;
    margin: 40px;
}
textarea {
    width: 600px;
    height: 200px;
}
button {
    margin-top: 10px;
    margin-right: 10px;
    padding: 10px;
}
#result {
    margin-top: 20px;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>Applicant Portal</h1>

<textarea id="resume-text" placeholder="Enter resume text here..."></textarea>

<br>

<button onclick="evaluateResume('safe')">Evaluate (Safe Model)</button>
<button onclick="evaluateResume('poisoned')">Evaluate (Poisoned Model)</button>

<div id="result"></div>

<script>
async function evaluateResume(mode) {

    const resume = document.getElementById("resume-text").value;

    const response = await fetch("http://localhost:8081/evaluate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            "resume-text": resume,
            "mode": mode
        })
    });

    const data = await response.json();

    document.getElementById("result").innerText =
        "Verdict: " + data.verdict + " (mode: " + data.mode + ")";
}
</script>

</body>
</html>
